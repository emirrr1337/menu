<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trüff Burger & Pizza - Dijital Menü</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-stone-950 text-stone-100 font-sans antialiased selection:bg-amber-500 selection:text-black">

    <header class="text-center py-10 bg-stone-900 border-b border-amber-500/20 shadow-2xl relative overflow-hidden">
        <div class="absolute inset-0 opacity-5 bg-[radial-gradient(#f59e0b_1px,transparent_1px)] [background-size:16px_16px]"></div>
        <div class="relative z-10 max-w-md mx-auto px-4">
            <div class="flex justify-center gap-4 text-amber-500 text-3xl mb-3 animate-pulse">
                <i class="fa-solid fa-burger"></i>
                <i class="fa-solid fa-pizza-slice"></i>
            </div>
            <h1 class="text-3xl md:text-4xl font-black tracking-tight uppercase text-white">TRÜFF BURGER & PIZZA</h1>
            <p class="text-xs text-amber-500 font-semibold tracking-widest mt-1 uppercase">Dijital Menü</p>
        </div>
    </header>

    <div class="sticky top-0 bg-stone-900/95 backdrop-blur-md border-b border-stone-800 z-50 py-3 shadow-lg overflow-x-auto whitespace-nowrap scrollbar-none">
        <div class="max-w-md mx-auto px-4 flex justify-between gap-2">
            <a href="#hamburger" class="bg-stone-800 hover:bg-amber-500 hover:text-stone-950 text-xs font-bold px-4 py-2 rounded-xl transition duration-200">🍔 Hamburger</a>
            <a href="#pizza" class="bg-stone-800 hover:bg-amber-500 hover:text-stone-950 text-xs font-bold px-4 py-2 rounded-xl transition duration-200">🍕 Pizza</a>
            <a href="#ekstralar" class="bg-stone-800 hover:bg-amber-500 hover:text-stone-950 text-xs font-bold px-4 py-2 rounded-xl transition duration-200">🍟 Ekstralar</a>
            <a href="#icecekler" class="bg-stone-800 hover:bg-amber-500 hover:text-stone-950 text-xs font-bold px-4 py-2 rounded-xl transition duration-200">🥤 İçecekler</a>
        </div>
    </div>

    <main class="max-w-md mx-auto px-4 py-8 pb-24 space-y-12">
